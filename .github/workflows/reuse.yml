name: REUSE Compliance Check
on: [ workflow_call ]

jobs:
  reuse:
    runs-on: ubuntu-latest
    name: "REUSE Lint"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: REUSE lint
        uses: fsfe/reuse-action@v3
        with:
          args: --include-submodules lint
