name: PHP Coding Standard Tests
on:
  workflow_call:
    inputs:
      coding-standard:
        required: false
        type: string
        default: 'Lunr'
      minimum-php-version:
        required: false
        type: string
        default: '8.3'
      php-extensions:
        required: false
        type: string
        default: ''

    secrets:
      COMPOSER_AUTH:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

env:
  SLACK_SEND_EVENTS: '["push", "schedule"]'

jobs:
  detect-tools:
    runs-on: ubuntu-latest
    outputs:
      phpcsfixer: ${{ steps.detect.outputs.phpcsfixer }}
      phpcs: ${{ steps.detect.outputs.phpcs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect tool usage
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          phpcs=false
          phpcsfixer=false

          # Check PHP-CS-Fixer
          if [ -f ".php-cs-fixer.php" ] || [ -f ".php-cs-fixer.dist.php" ]; then
            phpcsfixer=true
          elif grep -q '"friendsofphp/php-cs-fixer"' composer.json; then
            phpcsfixer=true
          fi

          # Check PHP_Codesniffer
          if grep -q '"squizlabs/php_codesniffer"' composer.json; then
            phpcs=true
          fi

          echo "phpcs=$phpcs" >> "$GITHUB_OUTPUT"
          echo "phpcsfixer=$phpcsfixer" >> "$GITHUB_OUTPUT"

  phpcs:
    runs-on: ubuntu-latest
    needs: detect-tools
    if: needs.detect-tools.outputs.phpcs == 'true'
    continue-on-error: false
    name: "PHPCS"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Just
        uses: extractions/setup-just@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f # v2.35.5+5
        with:
          php-version: ${{ inputs.minimum-php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: cs2pr

      - name: Install dependencies
        run: composer install
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

      - name: Run PHPCS
        run: composer run-script phpcs

      - name: Convert checkstyle output to github style
        if: always()
        run: cat ./build/logs/checkstyle.xml | cs2pr

      - name: Post a message in a channel
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ failure() && contains(fromJSON(env.SLACK_SEND_EVENTS), github.event_name) && env.SLACK_WEBHOOK_URL != '' }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*${{ github.repository }} (${{ github.ref_name }})*: PHPCS ${{ job.status }}\nURL: ${{ github.event.pull_request.html_url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}\nWorkflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*${{ github.repository }} (${{ github.ref_name }})*: PHPCS ${{ job.status }}\nURL: ${{ github.event.pull_request.html_url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}\nWorkflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  php-cs-fixer:
    runs-on: ubuntu-latest
    needs: detect-tools
    if: needs.detect-tools.outputs.phpcsfixer == 'true'
    continue-on-error: false
    name: "PHP-CS-Fixer"
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2.35.5+5
        with:
          php-version: ${{ inputs.minimum-php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: cs2pr

      - name: Install dependencies
        run: composer install

      - name: Run php-cs-fixer
        run: composer run-script php-cs-fixer

      - name: Convert checkstyle output to github style
        if: always()
        run: cat ./build/logs/php-cs-fixer-checkstyle.xml | cs2pr

      - name: Post a message in a channel
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ failure() && contains(fromJSON(env.SLACK_SEND_EVENTS), github.event_name) && env.SLACK_WEBHOOK_URL != '' }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*${{ github.repository }} (${{ github.ref_name }})*: PHP-CS-Fixer ${{ job.status }}\nURL: ${{ github.event.pull_request.html_url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}\nWorkflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*${{ github.repository }} (${{ github.ref_name }})*: PHP-CS-Fixer ${{ job.status }}\nURL: ${{ github.event.pull_request.html_url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}\nWorkflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
